<!DOCTYPE html>
<html>
<head>
  <title>School System</title>
</head>
<body>

<h2>Student Management System</h2>

<h3>Add Student</h3>

<input id="name" placeholder="အမည်"><br><br>
<input id="father" placeholder="အဖအမည်"><br><br>
<input id="phone" placeholder="ဖုန်း"><br><br>
<input id="class" placeholder="အတန်း"><br><br>

<button onclick="addStudent()">Save</button>

<hr>

<h3>Student List</h3>

<table border="1" width="100%">
  <thead>
    <tr>
      <th>အမည်</th>
      <th>အဖအမည်</th>
      <th>ဖုန်း</th>
      <th>အတန်း</th>
    </tr>
  </thead>
  <tbody id="list"></tbody>
</table>

<script>
let students = [];

function addStudent() {
  let name = document.getElementById("name").value;
  let father = document.getElementById("father").value;
  let phone = document.getElementById("phone").value;
  let cls = document.getElementById("class").value;

  students.push({ name, father, phone, cls });

  renderTable();

  document.getElementById("name").value = "";
  document.getElementById("father").value = "";
  document.getElementById("phone").value = "";
  document.getElementById("class").value = "";
}

function renderTable() {
  let table = document.getElementById("list");
  table.innerHTML = "";

  students.forEach(s => {
    table.innerHTML += 
      <tr>
        <td>${s.name}</td>
        <td>${s.father}</td>
        <td>${s.phone}</td>
        <td>${s.cls}</td>
      </tr>
    ;
  });
}
</script>

</body>
</html>
